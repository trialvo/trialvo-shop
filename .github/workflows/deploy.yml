name: Deploy Trialvo Shop

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: 155.248.253.24
          username: opc
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd /home/opc/trialvo-shop

            echo "=== Pulling latest code ==="
            git pull origin main

            echo "=== Stopping old containers ==="
            docker compose -f docker-compose.prod.yml down --remove-orphans 2>/dev/null || true

            echo "=== Cleaning up old MySQL volumes/images ==="
            docker volume rm trialvo-shop_shop_mysql_data 2>/dev/null || true
            docker volume rm trialvo-shop_trialvo-pay-postgres_data 2>/dev/null || true
            docker volume rm trialvo-shop_trialvo-pay-redis_data 2>/dev/null || true

            echo "=== Making init-db.sh executable ==="
            chmod +x init-db.sh

            echo "=== Building & deploying ==="
            docker compose -f docker-compose.prod.yml build --no-cache
            docker compose -f docker-compose.prod.yml up -d

            echo "=== Waiting for healthy ==="
            sleep 20
            docker compose -f docker-compose.prod.yml ps

            echo "=== Running seed SQL for trialvo-pay ==="
            docker compose -f docker-compose.prod.yml exec -T postgres psql -U trialvo -d trialvo_pay < seed.sql 2>/dev/null || echo "Seed already applied or skipped"

            echo "=== Cleaning up ==="
            docker image prune -f
            docker volume prune -f 2>/dev/null || true

            echo "✅ Deploy complete"
            echo "  → shop.trialvo.com"
            echo "  → shop-api.trialvo.com"
            echo "  → pay.trialvo.com"
