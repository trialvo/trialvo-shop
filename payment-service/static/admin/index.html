<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PayVault Admin</title>
<meta name="description" content="PayVault Central Payment Administration">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
          mono: ['JetBrains Mono', 'Fira Code', 'monospace'],
        },
        colors: {
          brand: {
            50: '#f0fdfa',
            100: '#ccfbf1',
            200: '#99f6e4',
            300: '#5eead4',
            400: '#2dd4bf',
            500: '#14b8a6',
            600: '#0d9488',
            700: '#0f766e',
            800: '#115e59',
            900: '#134e4a',
          },
        },
      },
    },
  }
</script>
<!-- Lucide Icons (CDN) -->
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="/assets/css/admin.css?v=10">
</head>
<body class="bg-gray-50 font-sans text-slate-800 antialiased">
<div id="app">
  <!-- Shell rendered by JS -->
  <div id="loading-screen" class="loading-screen">
    <div class="loading-logo">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
        <rect width="40" height="40" rx="12" fill="url(#grad)"/>
        <path d="M12 20h16M20 12v16" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        <defs>
          <linearGradient id="grad" x1="0" y1="0" x2="40" y2="40">
            <stop stop-color="#0d9488"/>
            <stop offset="1" stop-color="#14b8a6"/>
          </linearGradient>
        </defs>
      </svg>
      <span>PayVault</span>
    </div>
    <div class="loading-spinner"></div>
  </div>
</div>

<!-- Toast container -->
<div id="toast-container"></div>

<!-- Modal container -->
<div id="modal-backdrop" class="modal-backdrop hidden">
  <div id="modal-container"></div>
</div>

<script src="/assets/js/shared/ui.js?v=10"></script>
<script src="/assets/js/admin/api.js?v=10"></script>
<script src="/assets/js/admin/components.js?v=10"></script>
<script src="/assets/js/admin/pages.js?v=10"></script>
<script src="/assets/js/admin/app.js?v=10"></script>
</body>
</html>
