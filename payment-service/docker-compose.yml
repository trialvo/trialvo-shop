version: '3.9'

services:
  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: payvault-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-payvault}
      POSTGRES_USER: ${POSTGRES_USER:-payvault}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - payvault-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-payvault}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: payvault-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required} --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - payvault-internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── PayVault App ──────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payvault-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-payvault}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-payvault}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      MASTER_KEY: ${MASTER_KEY:?MASTER_KEY required (32 bytes hex)}
      BASE_URL: https://payvault.trialvo.com
      HOST: 0.0.0.0
      PORT: 8080
      RUST_LOG: info
    networks:
      - payvault-internal
      - payvault-external
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    # No port mapping — Nginx handles external access
    expose:
      - "8080"

  # ─── Nginx (reverse proxy + SSL termination) ────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: payvault-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/:/etc/nginx/conf.d/:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    networks:
      - payvault-external
      - payvault-internal
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  postgres_data:
    name: payvault_postgres_data
  redis_data:
    name: payvault_redis_data

networks:
  payvault-internal:
    name: payvault_internal
    driver: bridge
    internal: true   # No direct internet access
  payvault-external:
    name: payvault_external
    driver: bridge
