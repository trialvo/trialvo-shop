# ═══════════════════════════════════════════════════════════
#  PayVault — Full Local Dev (Postgres + Redis + App)
#  Usage: docker compose -f docker-compose.dev.yml up --build
# ═══════════════════════════════════════════════════════════

services:
  postgres:
    image: postgres:16-alpine
    container_name: payvault-dev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-payvault}
      POSTGRES_USER: ${POSTGRES_USER:-payvault}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-payvault_dev_2026}
    ports:
      - "5432:5432"
    volumes:
      - payvault_dev_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-payvault}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: payvault-dev-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_dev_2026} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - payvault_dev_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_dev_2026}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payvault-dev-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-payvault}:${POSTGRES_PASSWORD:-payvault_dev_2026}@postgres:5432/${POSTGRES_DB:-payvault}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_dev_2026}@redis:6379
      MASTER_KEY: ${MASTER_KEY:-45c11faf4c682130ba6610a471e76a5f5bbc4d9028b9d9ef7354d6beae681778}
      BASE_URL: http://localhost:8080
      HOST: 0.0.0.0
      PORT: 8080
      RUST_LOG: ${RUST_LOG:-debug}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

volumes:
  payvault_dev_pg:
    name: payvault_dev_pg
  payvault_dev_redis:
    name: payvault_dev_redis
