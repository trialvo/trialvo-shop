services:
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Tr1alv0Shop2026Secure!
      MYSQL_DATABASE: trialvo_shop
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - shop_mysql_data:/var/lib/mysql
    networks:
      - shop_internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  backend:
    build:
      context: ./trialvo-backend
      dockerfile: Dockerfile
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - ./trialvo-backend/.env.production
    environment:
      DB_HOST: mysql
    ports:
      - "127.0.0.1:5000:5000"
    networks:
      - shop_internal
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./trialvo-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: https://shop-api.trialvo.com/api
    restart: always
    ports:
      - "127.0.0.1:8090:80"
    networks:
      - shop_internal

  trialvo-pay-postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: trialvo_pay
      POSTGRES_USER: trialvo_pay
      POSTGRES_PASSWORD: TrialvoPayDB2026Secure!
    volumes:
      - trialvo-pay-postgres_data:/var/lib/postgresql/data
    networks:
      - shop_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trialvo_pay"]
      interval: 10s
      timeout: 5s
      retries: 5

  trialvo-pay-redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass TrialvoPayRedis2026Secure! --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - trialvo-pay-redis_data:/data
    networks:
      - shop_internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "TrialvoPayRedis2026Secure!", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  trialvo-pay:
    build:
      context: ./trialvo-pay
      dockerfile: Dockerfile
    restart: always
    depends_on:
      trialvo-pay-postgres:
        condition: service_healthy
      trialvo-pay-redis:
        condition: service_healthy
    env_file:
      - ./trialvo-pay/.env
    environment:
      DATABASE_URL: postgresql://trialvo_pay:TrialvoPayDB2026Secure!@trialvo-pay-postgres:5432/trialvo_pay
      REDIS_URL: redis://:TrialvoPayRedis2026Secure!@trialvo-pay-redis:6379
      BASE_URL: https://pay.trialvo.com
      HOST: 0.0.0.0
      PORT: 8080
      RUST_LOG: info
    networks:
      - shop_internal
    ports:
      - "127.0.0.1:8088:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

networks:
  shop_internal:
    driver: bridge

volumes:
  shop_mysql_data:
  trialvo-pay-postgres_data:
  trialvo-pay-redis_data:
