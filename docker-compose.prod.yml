services:
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Tr1alv0Shop2026Secure!
      MYSQL_DATABASE: trialvo_shop
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - shop_mysql_data:/var/lib/mysql
    networks:
      - shop_internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  backend:
    build:
      context: ./trialvo-backend
      dockerfile: Dockerfile
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      DB_HOST: mysql
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - shop_internal
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./trialvo-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    restart: always
    networks:
      - shop_internal

  nginx:
    image: nginx:alpine
    restart: always
    depends_on:
      - backend
      - frontend
    ports:
      - "127.0.0.1:8090:80"
    volumes:
      - ./nginx-shop.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - shop_internal

networks:
  shop_internal:
    driver: bridge

volumes:
  shop_mysql_data:
