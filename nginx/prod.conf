# ═══════════════════════════════════════════════════════════
# Trialvo Shop — Nginx Reverse Proxy (Production)
# Handles routing for 3 domains:
#   - shop.trialvo.com → frontend
#   - shop-api.trialvo.com → backend
#   - pay.trialvo.com → trialvo-pay
# SSL is handled by Caddy/certbot on the host machine
# ═══════════════════════════════════════════════════════════

# ─── shop.trialvo.com → Frontend ───────────────────────────
server {
    listen 80;
    server_name shop.trialvo.com;

    client_max_body_size 10M;

    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ─── shop-api.trialvo.com → Backend API ───────────────────
server {
    listen 80;
    server_name shop-api.trialvo.com;

    client_max_body_size 10M;

    location / {
        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}

# ─── pay.trialvo.com → Trialvo Pay ────────────────────────
server {
    listen 80;
    server_name pay.trialvo.com;

    client_max_body_size 10M;

    location / {
        proxy_pass http://trialvo-pay:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}
